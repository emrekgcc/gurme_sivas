<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gurme Sivas ile iletişime geçin. Öneri, şikayet ve işbirliği için bize ulaşın.">
    <link rel="icon" href="data:,">
    <!-- Önceki sürümde başlık yanlışlıkla "Ana Sayfa" yazıyordu, düzeltildi -->
    <title>İletişim | Gurme Sivas</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome async - render-blocking engellendi -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preload"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          as="style"
          onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </noscript>
</head>
<body>

    <a href="#main" class="skip-link">Ana İçeriğe Atla</a>
    <header></header>

    <main id="main">
        <div class="contact-container">
            <div class="contact-header">
                <h1>İletişim</h1>
                <p>Görüş ve önerileriniz için bize ulaşın</p>
            </div>
            <div class="contact-wrapper">
                <div class="contact-info">
                    <div class="info-item">
                        <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
                        <div>
                            <strong>Adres</strong>
                            <p>Sivas, Türkiye</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fa-solid fa-envelope" aria-hidden="true"></i>
                        <div>
                            <strong>E-posta</strong>
                            <p>info@gurmesivas.com</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fa-brands fa-instagram" aria-hidden="true"></i>
                        <div>
                            <strong>Instagram</strong>
                            <p>@gurmesivas1</p>
                        </div>
                    </div>
                </div>
                <div class="contact-map">
                    <!-- loading="lazy" ile iframe başlangıçta yüklenmez, CLS ve LCP iyileşir -->
                    <iframe src="https://maps.google.com/maps?q=Sivas+Merkez&output=embed"
                            title="Sivas Haritası"
                            width="100%"
                            height="450"
                            loading="lazy"
                            allowfullscreen
                            referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>
        </div>
    </main>

    <footer></footer>

    <script src="header.js" defer></script>
    <script src="footer.js" defer></script>
</body>
</html>
