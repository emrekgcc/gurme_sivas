<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sivas yöresel lezzetleri ve en iyi restoran rehberi. Sivas köftesi, katmer ve madımak aşı nerede yenir keşfedin.">
    <link rel="icon" href="data:,">
    <title>Gurme Sivas | Ana Sayfa</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <a href="#main" class="skip-link">Ana İçeriğe Atla</a>

    <header></header>

    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>SİVAS LEZZET DURAKLARI</h1>
            <p>Keşfedin, Tadın, Unutmayın</p>
        </div>
    </section>

    <main id="main">
        <div class="action-bar">
            <div class="filter-pills" id="filter-container">
                <button class="filter-btn active" data-filter="all">
                    <i class="fa-solid fa-border-all" aria-hidden="true"></i> Tümü
                </button>
                <button class="filter-btn" data-filter="Köfte & Kebap">
                    <i class="fa-solid fa-burger" aria-hidden="true"></i> Köfte & Kebap
                </button>
                <button class="filter-btn" data-filter="Yöresel Yemekler">
                    <i class="fa-solid fa-bowl-food" aria-hidden="true"></i> Yöresel
                </button>
                <button class="filter-btn" data-filter="Pide & Hamur İşi">
                    <i class="fa-solid fa-pizza-slice" aria-hidden="true"></i> Hamur İşi
                </button>
                <button class="filter-btn" data-filter="Kahvaltı & Çorba">
                    <i class="fa-solid fa-mug-hot" aria-hidden="true"></i> Kahvaltı
                </button>
                <button class="filter-btn" data-filter="Şarküteri / Diğer">
                    <i class="fa-solid fa-shop" aria-hidden="true"></i> Diğer
                </button>
            </div>

            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
                <input type="text" id="searchInput" placeholder="Mekan veya yemek ara...">
            </div>
        </div>

        <div id="restaurant-grid"></div>
    </main>

    <footer></footer>

    <script src="data.js"></script>
    <script src="header.js"></script>
    <script src="footer.js"></script>
    <script src="main.js"></script>
</body>
</html>
