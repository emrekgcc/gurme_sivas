<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gurme Sivas ile iletişime geçin. Öneri, şikayet ve işbirliği için bize ulaşın.">
    <link rel="icon" href="data:,">
    <!-- Önceki sürümde başlık yanlışlıkla "Ana Sayfa" yazıyordu, düzeltildi -->
    <title>İletişim | Gurme Sivas</title>

    <!-- Critical CSS inline — ilk render için header görünür olsun -->
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background-color:#f8f9fa;color:#2c3e50;line-height:1.6;display:flex;flex-direction:column;min-height:100vh}
        header{background:linear-gradient(135deg,#0d1b2a 0%,#1a2733 60%,#1e2f42 100%);border-bottom:3px solid #cbb279;padding:.6rem 5%;position:sticky;top:0;z-index:1000;min-height:106px;display:flex;align-items:center;}
        nav{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto;width:100%}
        nav ul{display:flex;list-style:none;gap:2.5rem}
        nav ul li a{text-decoration:none;color:#cbb279;font-weight:600;font-size:1rem}
        .skip-link{position:absolute;top:-100px;left:10px;background:#cbb279;color:#fff;padding:10px 15px;z-index:10001;font-weight:700;border-radius:5px;text-decoration:none}
        .skip-link:focus{top:10px}
    </style>

    <!-- Tam CSS async yükle -->
    <link rel="preload" href="style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="style.css"></noscript>

    <!-- Font Awesome async - render-blocking engellendi -->
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preload"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          as="style"
          onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </noscript>
</head>
<body>

    <a href="#main" class="skip-link">Ana İçeriğe Atla</a>
    <header></header>

    <main id="main">
        <div class="contact-container">
            <div class="contact-header">
                <h1>İletişim</h1>
                <p>Görüş ve önerileriniz için bize ulaşın</p>
            </div>
            <div class="contact-wrapper">
                <div class="contact-info">
                    <div class="info-item">
                        <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
                        <div>
                            <strong>Adres</strong>
                            <p>Sivas, Türkiye</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fa-solid fa-envelope" aria-hidden="true"></i>
                        <div>
                            <strong>E-posta</strong>
                            <p>info@gurmesivas.com</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fa-brands fa-instagram" aria-hidden="true"></i>
                        <div>
                            <strong>Instagram</strong>
                            <p>@gurmesivas1</p>
                        </div>
                    </div>
                </div>
                <div class="contact-map">
                    <!-- loading="lazy" ile iframe başlangıçta yüklenmez, CLS ve LCP iyileşir -->
                    <iframe src="https://maps.google.com/maps?q=Sivas+Merkez&output=embed"
                            title="Sivas Haritası"
                            width="100%"
                            height="450"
                            loading="lazy"
                            allowfullscreen
                            referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>
        </div>
    </main>

    <footer></footer>

    <script src="header.js" defer></script>
    <script src="footer.js" defer></script>
</body>
</html>
