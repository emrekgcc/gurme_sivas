<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sivas yöresel lezzetleri ve en iyi restoran rehberi. Sivas köftesi, katmer ve madımak aşı nerede yenir keşfedin.">
    <link rel="icon" href="data:,">
    <title>Gurme Sivas | Restoran Detayı</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <a href="#main" class="skip-link">Ana İçeriğe Atla</a>

    <header></header>

    <main id="main" class="container">
        <div id="detay-icerik">
        </div>
        <a href="index.html" class="btn-back">← Geri Dön</a>
    </main>

    <footer></footer>

    <script src="data.js"></script>
    <script src="header.js"></script>
    <script src="footer.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const seciliRestoran = restoranlar[id];

        if (seciliRestoran) {
            document.getElementById('detay-icerik').innerHTML = `
                <img src="${seciliRestoran.resim}" class="detay-img" alt="${seciliRestoran.ad}" loading="lazy">
                <h1>${seciliRestoran.ad}</h1>
                <p class="kategori">${seciliRestoran.kategori}</p>
                <div class="uzun-aciklama">${seciliRestoran.detayliYazi}</div>
                <div class="harita-cerceve">
                    <h3>Konum</h3>
                    <iframe src="${seciliRestoran.konum}" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            `;
        } else {
            document.getElementById('detay-icerik').innerHTML = "<h1>Mekan bulunamadı!</h1>";
        }
    </script>
</body>
</html>
