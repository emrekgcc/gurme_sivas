<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sivas yöresel lezzetleri ve en iyi restoran rehberi. Sivas köftesi, katmer ve madımak aşı nerede yenir keşfedin.">
    <link rel="icon" href="data:,">
    <title>Gurme Sivas | Restoran Detayı</title>

    <!-- Critical CSS inline — ilk render için header görünür olsun -->
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background-color:#f8f9fa;color:#2c3e50;line-height:1.6;display:flex;flex-direction:column;min-height:100vh}
        header{background:linear-gradient(135deg,#0d1b2a 0%,#1a2733 60%,#1e2f42 100%);border-bottom:3px solid #cbb279;padding:.6rem 5%;position:sticky;top:0;z-index:1000;min-height:106px;display:flex;align-items:center;}
        nav{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto;width:100%}
        nav ul{display:flex;list-style:none;gap:2.5rem}
        nav ul li a{text-decoration:none;color:#cbb279;font-weight:600;font-size:1rem}
        .skip-link{position:absolute;top:-100px;left:10px;background:#cbb279;color:#fff;padding:10px 15px;z-index:10001;font-weight:700;border-radius:5px;text-decoration:none}
        .skip-link:focus{top:10px}
        /* Detay sayfası iskelet */
        #detay-icerik{max-width:900px;margin:40px auto;padding:30px;background:#fff;border-radius:20px;min-height:400px}
    </style>

    <!-- Tam CSS async yükle -->
    <link rel="preload" href="style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="style.css"></noscript>

    <!-- Font Awesome async — senkron yükleme render-blocking yapıyordu, düzeltildi -->
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preload"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          as="style"
          onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </noscript>
</head>
<body>

    <a href="#main" class="skip-link">Ana İçeriğe Atla</a>

    <header></header>

    <main id="main" class="container">
        <div id="detay-icerik">
        </div>
        <a href="index.html" class="btn-back">← Geri Dön</a>
    </main>

    <footer></footer>

    <script src="data.js" defer></script>
    <script src="header.js" defer></script>
    <script src="footer.js" defer></script>

    <script>
        // defer'li script'ler DOM hazır olunca çalışır; inline script için DOMContentLoaded gerekir
        document.addEventListener('DOMContentLoaded', function () {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const seciliRestoran = restoranlar[id];
            const detayEl = document.getElementById('detay-icerik');

            if (seciliRestoran) {
                // Dinamik meta açıklaması (SEO)
                document.title = seciliRestoran.ad + ' | Gurme Sivas';
                const metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc) metaDesc.setAttribute('content', seciliRestoran.aciklama);

                detayEl.innerHTML = `
                    <img src="${seciliRestoran.resim}"
                         class="detay-img"
                         alt="${seciliRestoran.ad}"
                         width="900"
                         height="506"
                         fetchpriority="high">
                    <h1>${seciliRestoran.ad}</h1>
                    <p class="kategori">${seciliRestoran.kategori}</p>
                    <div class="uzun-aciklama">${seciliRestoran.detayliYazi}</div>
                    ${seciliRestoran.adres ? `<p class="detay-adres"><strong>📍 Adres:</strong> ${seciliRestoran.adres}</p>` : ''}
                    ${seciliRestoran.telefon ? `<p class="detay-telefon"><strong>📞 Telefon:</strong> <a href="tel:${seciliRestoran.telefon.replace(/\s/g,'')}">${seciliRestoran.telefon}</a></p>` : ''}
                    <div class="harita-cerceve">
                        <h3>Konum</h3>
                        <iframe src="${seciliRestoran.konum}"
                                title="${seciliRestoran.ad} Konumu"
                                width="100%"
                                height="300"
                                style="border:0;"
                                allowfullscreen
                                loading="lazy"
                                referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                `;
            } else {
                detayEl.innerHTML = "<h1>Mekan bulunamadı!</h1>";
            }
        });
    </script>
</body>
</html>
