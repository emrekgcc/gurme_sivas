<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- [GÜNCELLEME #4 - SEO] Daha hedef odaklı title ve meta description -->
    <meta name="description" content="Sivas'ın en iyi restoranları ve yöresel lezzetleri için kapsamlı rehber. Sivas köftesi, katmer ve madımak aşı nerede yenir? En iyi mekanları keşfedin.">

    <link rel="icon" href="data:,">

    <!-- [GÜNCELLEME #4 - SEO] Anahtar kelime odaklı sayfa başlığı -->
    <title>Gurme Sivas | Sivas'ın En İyi Restoranları ve Yöresel Lezzetleri</title>

    <!-- [GÜNCELLEME #1 - LCP] Font Awesome CDN'ine erken bağlantı kur; tarayıcı DNS/TLS handshake'i önceden tamamlasın -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

    <!--
        [GÜNCELLEME #1 - LCP] Hero resimlerini "fetchpriority=high" ile önceden yükle.
        Tarayıcı, CSS'i parse etmeden önce bu kritik görselleri indirmeye başlar.
        Bu, LCP skorunu doğrudan etkileyen en büyük kazanımdır.
        media attribute ile masaüstü/mobil için doğru resim preload edilir.
    -->
    <link rel="preload"
          as="image"
          href="assets/images/hero-bg.webp"
          type="image/webp"
          media="(min-width: 769px)"
          fetchpriority="high">

    <link rel="preload"
          as="image"
          href="assets/images/hero-bg-mobile.webp"
          type="image/webp"
          media="(max-width: 768px)"
          fetchpriority="high">

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome: render-blocking değil ama yine de preconnect ile hızlandırıldı -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <a href="#main" class="skip-link">Ana İçeriğe Atla</a>

    <header></header>

    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>SİVAS LEZZET DURAKLARI</h1>
            <p>Keşfedin, Tadın, Unutmayın</p>
        </div>
    </section>

    <main id="main">
        <div class="action-bar">
            <div class="filter-pills" id="filter-container">

                <button class="filter-btn active" data-filter="all" aria-label="Tüm mekanları göster">
                    <i class="fa-solid fa-border-all" aria-hidden="true"></i> Tümü
                </button>
                <button class="filter-btn" data-filter="Köfte & Kebap" aria-label="Köfte ve Kebap mekanlarını filtrele">
                    <i class="fa-solid fa-burger" aria-hidden="true"></i> Köfte & Kebap
                </button>
                <button class="filter-btn" data-filter="Yöresel Yemekler" aria-label="Yöresel yemek mekanlarını filtrele">
                    <i class="fa-solid fa-bowl-food" aria-hidden="true"></i> Yöresel
                </button>
                <button class="filter-btn" data-filter="Pide & Hamur İşi" aria-label="Pide ve hamur işi mekanlarını filtrele">
                    <i class="fa-solid fa-pizza-slice" aria-hidden="true"></i> Hamur İşi
                </button>
                <button class="filter-btn" data-filter="Kahvaltı & Çorba" aria-label="Kahvaltı ve çorba mekanlarını filtrele">
                    <i class="fa-solid fa-mug-hot" aria-hidden="true"></i> Kahvaltı
                </button>
                <button class="filter-btn" data-filter="Şarküteri / Diğer" aria-label="Şarküteri ve diğer mekanları filtrele">
                    <i class="fa-solid fa-shop" aria-hidden="true"></i> Diğer
                </button>
            </div>

            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>

                <input type="text"
                       id="searchInput"
                       placeholder="Mekan veya yemek ara..."
                       aria-label="Mekan veya yemek adına göre ara">
            </div>
        </div>

        <div id="restaurant-grid"></div>
    </main>

    <footer></footer>

    <script src="data.js" defer></script>
    <script src="header.js" defer></script>
    <script src="footer.js" defer></script>
    <script src="main.js" defer></script>
</body>
</html>
